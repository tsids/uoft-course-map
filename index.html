<!doctype html>

    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/course-tree-192.png" />
    <link rel="apple-touch-icon" href="/course-tree-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <script>
      // Apply the saved/preferred theme before first paint so the page never
      // flashes its default light background while the app bundle loads.
      // Must stay in sync with src/hooks/useTheme.ts.
      (function () {
        try {
          var stored = localStorage.getItem("darkMode");
          var dark =
            stored === "dark" ||
            (stored !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <title>UofT Course Map</title>
    <meta
      name="description"
      content="Explore University of Toronto courses as an interactive graph. Search a course to see its prerequisites, corequisites, exclusions, and everything it unlocks."
