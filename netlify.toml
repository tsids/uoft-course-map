[build]
  command = "npm run build"
  publish = "dist"

# Proxy the Umami tracker script through our own domain so ad blockers
# that block cloud.umami.is don't strip out analytics.
[[redirects]]
  from = "/stats.js"
  to = "https://cloud.umami.is/script.js"
  status = 200
  force = true

# The tracker derives its collect endpoint from the script's own origin,
# so events POST to /api/send on our domain — proxy that to Umami too.
[[redirects]]
  from = "/api/send"
  to = "https://cloud.umami.is/api/send"
  status = 200
  force = true
