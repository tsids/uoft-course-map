[build]
  command = "npm run build"
  publish = "dist"

# Proxy through our own domain
[[redirects]]
  from = "/stats.js"
  to = "https://cloud.umami.is/script.js"
  status = 200
  force = true

# Send data to our own domain, then to the Umami collection gateway.
[[redirects]]
  from = "/api/send"
  to = "https://gateway.umami.is/api/send"
  status = 200
  force = true
